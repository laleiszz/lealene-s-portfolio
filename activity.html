<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Lealene's Portfolio</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
}

header{
background:rgb(87,16,16);
padding:20px 30px;
display:flex;
flex-direction:column;
position:relative;
margin-bottom:40px;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
margin:0;
padding:0;
position:absolute;
bottom:20px;
right:20px;
}

nav a{
color:black;
font-weight:bold;
text-decoration:none;
padding:2px 13px;
border-radius:15px;
background-color:rgb(170,166,166);
border:1px solid black;
}

nav a:hover{
background-color:white;
}

.background{
background-image:url("pagod.jpg");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
position:fixed;
height:100%;
width:100%;
filter:blur(13px);
z-index:-1;
}

.myportfolio{
border:2px solid black;
text-align:center;
width:500px;
margin:20px auto;
border-radius:20px;
background-color:rgb(170,166,166);
padding:20px;
font-size:30px;
}

.card {
        max-width: 700px;
        width: 100%;
        background: white;
        border-radius: 2rem;
        padding: 2rem 1.5rem 2.5rem 1.5rem;
        box-shadow: 0 15px 30px #b9a6dd;
        text-align: center;
        
    
        }

h2 {
            color: #2c2152;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #a58bd4 #e5d9ff;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #e5d9ff;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #a58bd4;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #7a62b5;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #9d87cf;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .note {
            margin-top: 1.8rem;
            color: #4a3977;
            background: #eee5ff;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
        }

        .carou{
            text-align: center;
        }

footer {
    background:rgb(87, 16, 16);
    padding: 45px 30px;
    display: flex;
    flex-direction: column; 
    position: relative;  
    margin-top: 200px;
    align-items: center;
    color: antiquewhite;
    text-align: center;
}
    </style>
</head>

<body>
  <div class="background"> </div>

<header>
     <h1 class="myportfolio"> My Portfolio </h1>
    <nav>    
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="quiz.html">Quiz</a></li>
<li><a href="activity.html">Activity</a></li>
</ul>

    </nav>
    </header>
<section class="carou">

<div class="card">
        <h2>🖼️ simple carousel</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item">🌄 1</div>
            <div class="carousel-item">🏖️ 2</div>
            <div class="carousel-item">🏙️ 3</div>
            <div class="carousel-item">🌲 4</div>
            <div class="carousel-item">🌃 5</div>
            <div class="carousel-item">🏞️ 6</div>
        </div>

        <div class="note">
            ⬅️ swipe / drag →  ·  snap enabled  ·  pure CSS
        </div>

        <!-- short explanation -->
        <p style="margin-top: 1.5rem; color:#3c2d66; background:#f3ecff; padding:0.6rem; border-radius:3rem;">
            ✔️ <code>display: flex</code> + <code>overflow-x: auto</code> + <code>scroll-snap-type</code>
        </p>
    </div>

</section>

<footer>Facebook: Lealene Abrigo<br>

</footer>

    </body>

</html>
